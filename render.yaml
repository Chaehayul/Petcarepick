services:
  - type: web
    name: petcarepick-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run check && npm run db:deploy:optional
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: FRONTEND_ORIGIN
        value: https://petcarepick.netlify.app
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: MAP_PROVIDER
        value: openstreetmap
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_REPORT_MODEL
        value: gpt-5.5
      - key: OPENAI_STORE_RESPONSES
        value: "false"
